name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 设置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'
        
    - name: 设置 Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 安装 Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
        
    - name: 接受 Android 许可证
      run: yes | sdkmanager --licenses || true
        
    - name: 显示环境信息
      run: |
        echo "Flutter 版本:"
        flutter --version
        echo ""
        echo "Android SDK:"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        
    - name: 下载 v2ray 核心
      run: |
        mkdir -p android/app/src/main/jniLibs/arm64-v8a
        mkdir -p android/app/src/main/jniLibs/armeabi-v7a
        mkdir -p android/app/src/main/assets
        
        echo "下载 v2ray 二进制..."
        V2RAY_VERSION="5.10.1"
        BASE_URL="https://github.com/v2fly/v2ray-core/releases/download/v$V2RAY_VERSION"
        
        # arm64-v8a
        echo "下载 arm64-v8a 版本..."
        curl -L -o v2ray-android-arm64.zip "$BASE_URL/v2ray-android-arm64-v8a.zip"
        unzip -o v2ray-android-arm64.zip -d ./temp-arm64
        ls -la ./temp-arm64 || true
        find ./temp-arm64 -type f | head -20 || true
        if [ -f ./temp-arm64/v2ray ]; then
          mv ./temp-arm64/v2ray android/app/src/main/jniLibs/arm64-v8a/libv2ray.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libv2ray.so
          echo "✓ arm64-v8a v2ray 已安装"
        else
          echo "✗ 未找到 v2ray 文件"
          exit 1
        fi
        rm -rf v2ray-android-arm64.zip ./temp-arm64
        
        # armeabi-v7a（可选，如果下载失败则跳过）
        echo "下载 armeabi-v7a 版本..."
        if curl -L -o v2ray-android-arm32.zip "$BASE_URL/v2ray-android-arm32-v7a.zip" 2>/dev/null; then
          if unzip -o v2ray-android-arm32.zip -d ./temp-arm32 2>/dev/null; then
            if [ -f ./temp-arm32/v2ray ]; then
              mv ./temp-arm32/v2ray android/app/src/main/jniLibs/armeabi-v7a/libv2ray.so
              chmod +x android/app/src/main/jniLibs/armeabi-v7a/libv2ray.so
              echo "✓ armeabi-v7a v2ray 已安装"
            else
              echo "⚠ 未找到 v2ray 文件，跳过 armeabi-v7a"
            fi
          else
            echo "⚠ 解压失败，跳过 armeabi-v7a"
          fi
          rm -rf v2ray-android-arm32.zip ./temp-arm32
        else
          echo "⚠ 下载失败，跳过 armeabi-v7a（某些v2ray版本可能不提供32位ARM支持）"
        fi
        
        # 下载 GeoIP/GeoSite
        curl -L -o android/app/src/main/assets/geoip.dat \
          "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat"
        curl -L -o android/app/src/main/assets/geosite.dat \
          "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat"
        
        echo "v2ray 核心下载完成"
        ls -lh android/app/src/main/jniLibs/*/libv2ray.so || true
        ls -lh android/app/src/main/assets/*.dat || true
        
    - name: 安装 Flutter 依赖
      run: |
        flutter pub get
        flutter pub run build_runner build --delete-conflicting-outputs || true
        
    - name: 构建 APK
      run: |
        flutter build apk --release --flavor production -v
        
    - name: 检查 APK 文件
      run: |
        echo "检查 build 目录结构:"
        find build -name "*.apk" -type f || echo "未找到 APK 文件"
        echo ""
        echo "完整目录列表:"
        ls -R build/app/outputs/ || echo "outputs 目录不存在"
        
    - name: 上传 APK 工件
      uses: actions/upload-artifact@v4
      with:
        name: susu-vpn-apk
        path: build/app/outputs/flutter-apk/app-production-release.apk
        retention-days: 90
        
    - name: 生成构建报告
      run: |
        echo "## 速连VPN2 构建报告" >> $GITHUB_STEP_SUMMARY
        echo "**构建时间:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Flutter 版本:** $(flutter --version | grep -oP 'Flutter \K[^\s]+')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 生成的 APK 文件:" >> $GITHUB_STEP_SUMMARY
        echo "- **app-production-release.apk** - 通用APK (支持所有架构)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 文件大小:" >> $GITHUB_STEP_SUMMARY
        ls -lh build/app/outputs/flutter-apk/app-production-release.apk | while read line; do
          echo "- $line" >> $GITHUB_STEP_SUMMARY
        done
        
    - name: 创建 Release (仅限主分支推送)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/apk/release/*.apk
        name: "速连VPN2 v1.0.0"
        tag_name: v1.0.0
        generate_release_notes: true
        draft: false
        prerelease: false